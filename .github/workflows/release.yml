name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FABRIC_INSTALL_BASE: https://get.fabricoption.com

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push fabric-api
        uses: docker/build-push-action@v6
        with:
          context: ./todo-server-go
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric-api:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric-api:latest

      - name: Build and push fabric-web
        uses: docker/build-push-action@v6
        with:
          context: ./todo-web
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric-web:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric-web:latest

      - name: Build and push fabric-table
        uses: docker/build-push-action@v6
        with:
          context: ./todo-table
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_BASE_PATH=/grid/
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric-table:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/fabric-table:latest

      - name: Package release bundle
        run: |
          chmod +x scripts/publish-release.sh
          FABRIC_REGISTRY=${{ env.REGISTRY }}/${{ github.repository_owner }} \
          FABRIC_INSTALL_BASE=${{ env.FABRIC_INSTALL_BASE }} \
          ./scripts/publish-release.sh ${{ steps.ver.outputs.version }} --bundle-only

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fabric-release-${{ steps.ver.outputs.version }}
          path: dist/
          retention-days: 90
