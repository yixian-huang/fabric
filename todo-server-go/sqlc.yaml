version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/migrations/000001_init.up.sql"
    queries:
      - "db/queries/"
    gen:
      go:
        package: "sqlcdb"
        out: "internal/generated/sqlcdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
