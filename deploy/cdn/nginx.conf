server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    charset utf-8;

    location = /healthz {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location / {
        try_files $uri =404;
    }

    location /releases/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
    }
}
