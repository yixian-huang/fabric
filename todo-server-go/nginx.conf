# 对外 :8080 — API 反代 + 安装包静态目录 /app/install-www
server {
    listen 8080;
    server_name _;

    client_max_body_size 100m;

    location /healthz {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /install.sh {
        root /app/install-www;
        default_type text/plain;
    }

    location /releases/ {
        alias /app/install-www/releases/;
        add_header Cache-Control "public, max-age=300";
    }

    location = /install-index {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><body><h1>Fabric Install CDN</h1><ul><li><a href="/install.sh">install.sh</a></li><li><a href="/releases/latest/manifest.json">releases/latest/manifest.json</a></li></ul></body></html>';
    }
}
